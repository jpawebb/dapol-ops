
version: 1

models:
  - name: dim_models
    columns:
      - name: model_id
        description: "Unique identifier for each model."
        tests:
          - unique
          - not_null
      - name: model_name
        description: "Name of the model."
      - name: model_type
        description: "Type or category of the model."
      - name: scale
        description: "Scale of the model"
        tests:
          - accepted_values:
              config:
                where: "scale is not null"
              arguments:
                values: ["HO", "N", "O"]  
      - name: created_at
        description: "Timestamp when the model was created."